<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Interaktives Reaktionslabor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { font-size: 1.5rem; border-bottom: 2px solid #0056b3; padding-bottom: 10px; margin-top: 0; text-align: center; }
        
        .top-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; font-size: 1.1rem; }
        select { padding: 8px; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc; }
        .checkbox-container { display: none; align-items: center; gap: 5px; } /* Standardmäßig ausgeblendet */
        
        .slider-container { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 20px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .canvas-container { display: flex; flex-direction: column; gap: 20px; }
        canvas { border: 1px solid #ccc; border-radius: 4px; background: #fafafa; width: 100%; }
        #explanation { background: #e3f2fd; padding: 15px; border-left: 5px solid #2196f3; font-size: 1.1rem; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Reaktionsmechanismen</h1>
    
    <div class="top-controls">
        <label for="mechSelect">Mechanismus:</label>
        <select id="mechSelect">
            <option value="sn2">SN2-Mechanismus</option>
            <option value="sn1">SN1-Mechanismus</option>
            <option value="ester">Veresterung</option>
        </select>

        <div class="checkbox-container" id="catWrapper">
            <input type="checkbox" id="catCheck">
            <label for="catCheck">Säurekatalysiert</label>
        </div>
    </div>
    
    <div class="slider-container">
        <label for="progress">Fortschritt:</label>
        <input type="range" id="progress" min="0" max="100" value="0">
        <span id="progress-val">0%</span>
    </div>

    <div class="canvas-container">
        <canvas id="molCanvas" width="760" height="280"></canvas>
        <canvas id="energyCanvas" width="760" height="250"></canvas>
        <div id="explanation">Wähle einen Mechanismus und schiebe den Regler.</div>
    </div>
</div>

<script>
    // --- UI Elemente ---
    const mechSelect = document.getElementById('mechSelect');
    const catWrapper = document.getElementById('catWrapper');
    const catCheck = document.getElementById('catCheck');
    const progressSlider = document.getElementById('progress');
    const progressVal = document.getElementById('progress-val');
    const explanation = document.getElementById('explanation');
    
    const molCanvas = document.getElementById('molCanvas');
    const ctxMol = molCanvas.getContext('2d');
    const energyCanvas = document.getElementById('energyCanvas');
    const ctxEnergy = energyCanvas.getContext('2d');

    // --- Event Listeners ---
    mechSelect.addEventListener('change', () => {
        catWrapper.style.display = (mechSelect.value === 'ester') ? 'flex' : 'none';
        resetSlider();
    });
    catCheck.addEventListener('change', resetSlider);
    progressSlider.addEventListener('input', update);

    function resetSlider() {
        progressSlider.value = 0;
        update();
    }

    // --- Zentrale Update-Funktion ---
    function update() {
        const t = parseInt(progressSlider.value) / 100;
        progressVal.textContent = Math.round(t * 100) + '%';
        
        ctxMol.clearRect(0, 0, molCanvas.width, molCanvas.height);
        ctxEnergy.clearRect(0, 0, energyCanvas.width, energyCanvas.height);
        
        const mode = mechSelect.value;
        const catalyzed = catCheck.checked;

        if (mode === 'sn2') {
            drawSN2(t); drawSN2Energy(t); updateSN2Text(t);
        } else if (mode === 'sn1') {
            drawSN1(t); drawSN1Energy(t); updateSN1Text(t);
        } else if (mode === 'ester' && !catalyzed) {
            drawEsterUncat(t); drawEsterUncatEnergy(t); updateEsterUncatText(t);
        } else if (mode === 'ester' && catalyzed) {
            drawEsterCat(t); drawEsterCatEnergy(t); updateEsterCatText(t);
        }
    }

    // --- Universelle Zeichenfunktion für Bindungen ---
    function drawBond(ctx, x1, y1, x2, y2, r1, r2, dashed = false, double = false) {
        const dx = x2 - x1, dy = y2 - y1, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < r1 + r2) return;
        const px1 = x1 + (dx/dist)*r1, py1 = y1 + (dy/dist)*r1;
        const px2 = x2 - (dx/dist)*r2, py2 = y2 - (dy/dist)*r2;

        ctx.beginPath();
        ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
        if (dashed) ctx.setLineDash([5, 5]);

        if (double) {
            const nx = -dy/dist * 4, ny = dx/dist * 4;
            ctx.moveTo(px1 + nx, py1 + ny); ctx.lineTo(px2 + nx, py2 + ny);
            ctx.moveTo(px1 - nx, py1 - ny); ctx.lineTo(px2 - nx, py2 - ny);
        } else {
            ctx.moveTo(px1, py1); ctx.lineTo(px2, py2);
        }
        ctx.stroke(); ctx.setLineDash([]);
    }

    // --- Grundgerüst Energiediagramm ---
    function drawEnergyAxes() {
        const w = energyCanvas.width, h = energyCanvas.height, pad = 60, rightPad = 120;
        ctxEnergy.beginPath();
        ctxEnergy.moveTo(pad, pad); ctxEnergy.lineTo(pad, h - pad); ctxEnergy.lineTo(w - rightPad, h - pad);
        ctxEnergy.strokeStyle = '#333'; ctxEnergy.lineWidth = 1; ctxEnergy.stroke();
        ctxEnergy.fillStyle = '#333'; ctxEnergy.font = 'bold 12px Arial'; ctxEnergy.textAlign = 'center';
        ctxEnergy.fillText('Energie', pad - 20, pad - 10);
        ctxEnergy.fillText('Reaktionsweg', w - rightPad + 10, h - pad + 20);
        return { w, h, pad, rightPad };
    }

    function drawEnergyDot(dotX, dotY) {
        ctxEnergy.beginPath(); ctxEnergy.arc(dotX, dotY, 8, 0, 2 * Math.PI);
        ctxEnergy.fillStyle = 'red'; ctxEnergy.fill(); ctxEnergy.strokeStyle='#000'; ctxEnergy.stroke();
    }

    // ==========================================
    // MODULE: SN2
    // ==========================================
    function updateSN2Text(t) {
        if (t < 0.1) explanation.innerText = "Edukte: Das Nucleophil (HO⁻) nähert sich.";
        else if (t < 0.45) explanation.innerText = "Annäherung: Die Bindung zum Chlor wird geschwächt, während der C-O-Abstand abnimmt.";
        else if (t < 0.55) explanation.innerText = "Übergangszustand: Trigonal-bipyramidale Geometrie; beide Bindungen sind partiell ausgebildet.";
        else if (t < 0.9) explanation.innerText = "Walden-Umkehr: Das Chlorid-Ion trennt sich ab, die H-Atome klappen um.";
        else explanation.innerText = "Produkte: Die Substitution ist abgeschlossen (Methanol + Chlorid-Ion).";
    }

    function drawSN2(t) {
        const cx = 380, cy = 140;
        const xNu = 150 + 160 * t;
        const xLg = 450 + 160 * t;

        ctxMol.font = 'bold 20px Arial'; ctxMol.textAlign = 'center'; ctxMol.textBaseline = 'middle';

        if (t > 0.1) drawBond(ctxMol, xNu + 25, cy, cx - 14, cy, 0, 0, t < 0.95);
        if (t < 0.9) drawBond(ctxMol, cx + 14, cy, xLg - 16, cy, 0, 0, t > 0.05);

        ctxMol.fillStyle = '#2e7d32'; ctxMol.fillText('HO⁻', xNu, cy);
        ctxMol.fillStyle = '#000'; ctxMol.fillText('C', cx, cy);
        ctxMol.fillStyle = '#f57c00'; ctxMol.fillText(t > 0.9 ? 'Cl⁻' : 'Cl', xLg, cy);

        const hs = [
            { x: cx + (t - 0.5) * 40, y: cy - 65 },
            { x: cx + (t - 0.5) * 80 + Math.sin(t * Math.PI) * 30, y: cy + 30 },
            { x: cx + (t - 0.5) * 120 - Math.sin(t * Math.PI) * 20, y: cy + 75 }
        ];
        ctxMol.fillStyle = '#333';
        hs.forEach(h => {
            drawBond(ctxMol, cx, cy, h.x, h.y, 14, 12);
            ctxMol.fillText('H', h.x, h.y);
        });
    }

    function drawSN2Energy(t) {
        const { w, h, pad, rightPad } = drawEnergyAxes();
        ctxEnergy.beginPath();
        for(let x = 0; x <= 1; x += 0.01) {
            let e = Math.sin(x * Math.PI) * 120 - (x * 30);
            const px = pad + x * (w - pad - rightPad), py = h - pad - 30 - e;
            x === 0 ? ctxEnergy.moveTo(px, py) : ctxEnergy.lineTo(px, py);
        }
        ctxEnergy.strokeStyle = '#0056b3'; ctxEnergy.lineWidth = 3; ctxEnergy.stroke();
        
        let currentE = Math.sin(t * Math.PI) * 120 - (t * 30);
        drawEnergyDot(pad + t * (w - pad - rightPad), h - pad - 30 - currentE);
    }

    // ==========================================
    // MODULE: SN1
    // ==========================================
    function updateSN1Text(t) {
        if (t < 0.1) explanation.innerText = "Edukte: tert-Butylchlorid liegt vor. Das Chlorid-Ion beginnt sich zu lösen.";
        else if (t < 0.45) explanation.innerText = "Schritt 1 (langsam): Heterolytische Spaltung der C-Cl-Bindung. Die CH₃-Gruppen ordnen sich planar an.";
        else if (t < 0.55) explanation.innerText = "Zwischenzustand: Ein planares, durch die CH₃-Gruppen stabilisiertes Carbeniumion (C⁺) liegt vor.";
        else if (t < 0.9) explanation.innerText = "Schritt 2 (schnell): Das Nucleophil (HO⁻) greift das planare Carbeniumion an. Die Struktur klappt um.";
        else explanation.innerText = "Produkte: Die Substitution ist abgeschlossen. tert-Butanol und ein Chlorid-Ion (Cl⁻) sind entstanden.";
    }

    function drawSN1(t) {
        const cx = 380, cy = 140;
        const offset = (t - 0.5) * 90; 
        const ch3_groups = [
            { x: cx + offset - 10, y: cy - 70 },
            { x: cx + offset + 25, y: cy + 60 },
            { x: cx + offset - 35, y: cy + 50 }
        ];

        ctxMol.font = 'bold 20px Arial'; ctxMol.textAlign = 'center'; ctxMol.textBaseline = 'middle';

        ctxMol.fillStyle = '#000';
        ctxMol.fillText(t > 0.4 && t < 0.6 ? 'C⁺' : 'C', cx, cy);

        ctxMol.fillStyle = '#333';
        ch3_groups.forEach(g => {
            drawBond(ctxMol, cx, cy, g.x, g.y, 14, 22);
            ctxMol.fillText('CH₃', g.x, g.y);
        });

        let xCl = cx + 50; 
        if (t > 0 && t <= 0.5) xCl += (t / 0.5) * 150; 
        else if (t > 0.5) xCl += 150; 
        
        if (t < 0.5) drawBond(ctxMol, cx, cy, xCl, cy, 14, 16, t > 0.1);
        ctxMol.fillStyle = '#f57c00'; ctxMol.fillText(t > 0.4 ? 'Cl⁻' : 'Cl', xCl, cy);

        let xNu = cx - 50 - 200;
        if (t > 0.5) xNu += ((t - 0.5) / 0.5) * 200;
        if (t > 0.5) drawBond(ctxMol, xNu, cy, cx, cy, 22, 14, t < 0.9);
        ctxMol.fillStyle = '#2e7d32'; ctxMol.fillText(t > 0.9 ? 'HO' : 'HO⁻', xNu, cy);
    }

    function drawSN1Energy(t) {
        const { w, h, pad, rightPad } = drawEnergyAxes();
        ctxEnergy.beginPath();
        for(let x = 0; x <= 1; x += 0.01) {
            let e = (x < 0.5) ? 40 * (x/0.5) + Math.sin(x * Math.PI / 0.5) * 60 : 40 - 30 * ((x-0.5)/0.5) + Math.sin((x-0.5) * Math.PI / 0.5) * 40;
            const px = pad + x * (w - pad - rightPad), py = h - pad - 30 - e;
            x === 0 ? ctxEnergy.moveTo(px, py) : ctxEnergy.lineTo(px, py);
        }
        ctxEnergy.strokeStyle = '#0056b3'; ctxEnergy.lineWidth = 3; ctxEnergy.stroke();
        
        let currentE = (t < 0.5) ? 40 * (t/0.5) + Math.sin(t * Math.PI / 0.5) * 60 : 40 - 30 * ((t-0.5)/0.5) + Math.sin((t-0.5) * Math.PI / 0.5) * 40;
        drawEnergyDot(pad + t * (w - pad - rightPad), h - pad - 30 - currentE);
    }

    // ==========================================
    // MODULE: ESTER (Unkatalysiert)
    // ==========================================
    function updateEsterUncatText(t) {
        if (t < 0.40) explanation.innerText = "Schritt 1: Nucleophiler Angriff (0-40%). Das Methanol greift das unprotonierte, schwach elektrophile C-Atom an. Sehr hohe Aktivierungsenergie.";
        else if (t < 0.60) explanation.innerText = "Schritt 2: Zwitterionische Zwischenstufe (40-60%). Das Carbonyl-O ist negativ (O⁻), das addierte Methanol positiv geladen.";
        else if (t < 0.80) explanation.innerText = "Schritt 3: Protonenübergang (60-80%). Ein Proton wandert intramolekular zur Hydroxygruppe. Entstehung der Abgangsgruppe (H₂O⁺).";
        else explanation.innerText = "Schritt 4: Eliminierung (80-100%). Wasser spaltet sich ab. Das Elektronenpaar des O⁻ klappt zurück und der Ester ist entstanden.";
    }

    function drawEsterUncat(t) {
        const cx = 350, cy = 140;
        ctxMol.font = 'bold 20px Arial'; ctxMol.textAlign = 'center'; ctxMol.textBaseline = 'middle';

        drawBond(ctxMol, cx, cy, cx-70, cy, 14, 22);
        ctxMol.fillStyle = '#000'; ctxMol.fillText('H₃C', cx-70, cy);
        ctxMol.fillStyle = '#000'; ctxMol.fillText('C', cx, cy);

        let topDouble = (t < 0.4 || t > 0.8);
        drawBond(ctxMol, cx, cy, cx, cy-60, 14, 14, false, topDouble);
        ctxMol.fillStyle = '#e53935'; ctxMol.fillText('O', cx, cy-60);
        if (t > 0.4 && t <= 0.8) ctxMol.fillText('⁻', cx+12, cy-65);

        let rightX = (t <= 0.4) ? 550 - (t/0.4)*130 : 420;
        if (t > 0) drawBond(ctxMol, cx, cy, rightX, cy, 14, 14, t < 0.4);
        ctxMol.fillStyle = '#1e88e5'; ctxMol.fillText('O', rightX, cy);
        drawBond(ctxMol, rightX, cy, rightX+45, cy, 14, 22);
        ctxMol.fillStyle = '#333'; ctxMol.fillText('CH₃', rightX+45, cy);

        if (t <= 0.6) {
            drawBond(ctxMol, rightX, cy, rightX, cy-35, 14, 12);
            ctxMol.fillStyle = '#333'; ctxMol.fillText('H', rightX, cy-35);
        }
        if (t > 0.4 && t <= 0.6) {
            ctxMol.fillStyle = '#1e88e5'; ctxMol.fillText('⁺', rightX+15, cy-15);
        }

        let bottomY = (t > 0.8) ? cy+60 + ((t-0.8)/0.2)*100 : cy+60;
        if (t < 0.95) drawBond(ctxMol, cx, cy, cx, bottomY, 14, 14, t > 0.8);
        ctxMol.fillStyle = '#2e7d32'; ctxMol.fillText('O', cx, bottomY);

        drawBond(ctxMol, cx, bottomY, cx-25, bottomY+25, 12, 12);
        ctxMol.fillStyle = '#333'; ctxMol.fillText('H', cx-25, bottomY+25);

        if (t > 0.6) {
            drawBond(ctxMol, cx, bottomY, cx+25, bottomY+25, 12, 12);
            ctxMol.fillStyle = '#333'; ctxMol.fillText('H', cx+25, bottomY+25);
        }
        if (t > 0.6 && t <= 0.8) {
            ctxMol.fillStyle = '#2e7d32'; ctxMol.fillText('⁺', cx+18, bottomY-10);
        }
    }

    function drawEsterUncatEnergy(t) {
        const { w, h, pad, rightPad } = drawEnergyAxes();
        ctxEnergy.beginPath();
        for(let x = 0; x <= 1; x += 0.01) {
            let e = (x <= 0.6) ? Math.sin(x * Math.PI / 0.6) * 130 + 20 * (x / 0.6) : Math.sin((x - 0.6) * Math.PI / 0.4) * 40 + 20 * (1 - (x - 0.6) / 0.4);
            const px = pad + x * (w - pad - rightPad), py = h - pad - 30 - e;
            x === 0 ? ctxEnergy.moveTo(px, py) : ctxEnergy.lineTo(px, py);
        }
        ctxEnergy.strokeStyle = '#d32f2f'; ctxEnergy.lineWidth = 3; ctxEnergy.stroke();
        
        let currentE = (t <= 0.6) ? Math.sin(t * Math.PI / 0.6) * 130 + 20 * (t / 0.6) : Math.sin((t - 0.6) * Math.PI / 0.4) * 40 + 20 * (1 - (t - 0.6) / 0.4);
        drawEnergyDot(pad + t * (w - pad - rightPad), h - pad - 30 - currentE);
    }

    // ==========================================
    // MODULE: ESTER (Säurekatalysiert)
    // ==========================================
    function updateEsterCatText(t) {
        if (t < 0.10) explanation.innerText = "Schritt 1: Protonierung (0-10%). Der Katalysator (H⁺) bindet an den Carbonyl-Sauerstoff und erhöht die Elektrophilie des C-Atoms.";
        else if (t < 0.40) explanation.innerText = "Schritt 2: Nucleophiler Angriff (10-40%). Das Methanol greift das elektrophile C-Atom an.";
        else if (t < 0.60) explanation.innerText = "Schritt 3: Tetraedrische Zwischenstufe (40-60%). Das addierte Methanol-Molekül trägt nun eine positive formale Ladung.";
        else if (t < 0.80) explanation.innerText = "Schritt 4: Protonenübergang (60-80%). Ein Proton wandert intramolekular. Wasser entsteht als Abgangsgruppe (H₂O⁺).";
        else if (t < 0.95) explanation.innerText = "Schritt 5: Eliminierung (80-95%). Wasser spaltet sich ab. Das Elektronenpaar klappt zurück und bildet die Doppelbindung.";
        else explanation.innerText = "Schritt 6: Deprotonierung (95-100%). Das Proton (H⁺) wird abgestoßen. Der Katalysator ist regeneriert, das Produkt liegt vor.";
    }

    function drawEsterCat(t) {
        const cx = 350, cy = 140;
        ctxMol.font = 'bold 20px Arial'; ctxMol.textAlign = 'center'; ctxMol.textBaseline = 'middle';

        drawBond(ctxMol, cx, cy, cx-70, cy, 14, 22);
        ctxMol.fillStyle = '#000'; ctxMol.fillText('H₃C', cx-70, cy);
        ctxMol.fillStyle = '#000'; ctxMol.fillText('C', cx, cy);

        let topDouble = (t < 0.4 || t > 0.8);
        drawBond(ctxMol, cx, cy, cx, cy-60, 14, 14, false, topDouble);
        ctxMol.fillStyle = '#e53935'; ctxMol.fillText('O', cx, cy-60);

        if (t > 0.1 && t < 0.95) {
            drawBond(ctxMol, cx, cy-60, cx+25, cy-85, 12, 10);
            ctxMol.fillStyle = '#333'; ctxMol.fillText('H', cx+25, cy-85);
            if ((t > 0.1 && t <= 0.4) || (t >= 0.8 && t < 0.95)) {
                ctxMol.fillStyle = '#e53935'; ctxMol.fillText('⁺', cx+18, cy-65);
            }
        }

        if (t <= 0.1) {
            ctxMol.fillStyle = '#f57c00';
            ctxMol.fillText('H⁺', cx + 50 - (t/0.1)*25, cy - 110 + (t/0.1)*25);
        } else if (t >= 0.95) {
            ctxMol.fillStyle = '#f57c00';
            ctxMol.fillText('H⁺', cx + 25 + ((t-0.95)/0.05)*40, cy - 85 - ((t-0.95)/0.05)*40);
        }

        let rightX = 550;
        if (t > 0.1 && t <= 0.4) rightX = 550 - ((t-0.1)/0.3)*130;
        else if (t > 0.4) rightX = 420;

        if (t > 0.1) drawBond(ctxMol, cx, cy, rightX, cy, 14, 14, t < 0.4);
        ctxMol.fillStyle = '#1e88e5'; ctxMol.fillText('O', rightX, cy);

        drawBond(ctxMol, rightX, cy, rightX+45, cy, 14, 22);
        ctxMol.fillStyle = '#333'; ctxMol.fillText('CH₃', rightX+45, cy);

        if (t <= 0.6) {
            drawBond(ctxMol, rightX, cy, rightX, cy-35, 14, 12);
            ctxMol.fillStyle = '#333'; ctxMol.fillText('H', rightX, cy-35);
        }
        if (t > 0.4 && t <= 0.6) {
            ctxMol.fillStyle = '#1e88e5'; ctxMol.fillText('⁺', rightX+15, cy-15);
        }

        let bottomY = cy+60;
        if (t > 0.8 && t <= 0.95) bottomY = cy+60 + ((t-0.8)/0.15)*80;
        else if (t > 0.95) bottomY = cy+140;

        if (t < 0.95) drawBond(ctxMol, cx, cy, cx, bottomY, 14, 14, t > 0.8 && t < 0.95);
        ctxMol.fillStyle = '#2e7d32'; ctxMol.fillText('O', cx, bottomY);

        drawBond(ctxMol, cx, bottomY, cx-25, bottomY+25, 12, 12);
        ctxMol.fillStyle = '#333'; ctxMol.fillText('H', cx-25, bottomY+25);

        if (t > 0.6) {
            drawBond(ctxMol, cx, bottomY, cx+25, bottomY+25, 12, 12);
            ctxMol.fillStyle = '#333'; ctxMol.fillText('H', cx+25, bottomY+25);
        }
        if (t > 0.6 && t <= 0.8) {
            ctxMol.fillStyle = '#2e7d32'; ctxMol.fillText('⁺', cx+18, bottomY-10);
        }
    }

    function drawEsterCatEnergy(t) {
        const { w, h, pad, rightPad } = drawEnergyAxes();
        ctxEnergy.beginPath();
        for(let x = 0; x <= 1; x += 0.01) {
            let e = Math.sin(x * Math.PI) * 60 + Math.sin(x * 6 * Math.PI) * 15;
            const px = pad + x * (w - pad - rightPad), py = h - pad - 30 - Math.max(0, e);
            x === 0 ? ctxEnergy.moveTo(px, py) : ctxEnergy.lineTo(px, py);
        }
        ctxEnergy.strokeStyle = '#0056b3'; ctxEnergy.lineWidth = 3; ctxEnergy.stroke();
        
        let currentE = Math.sin(t * Math.PI) * 60 + Math.sin(t * 6 * Math.PI) * 15;
        drawEnergyDot(pad + t * (w - pad - rightPad), h - pad - 30 - Math.max(0, currentE));
    }

    // Init
    update();
</script>
</body>
</html>

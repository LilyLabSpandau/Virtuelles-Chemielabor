<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Virtuelles Chemielabor</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }

    .table-container {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('lab-table.jpg') no-repeat center center;
      background-size: cover;
    }

    .lab-link {
      position: absolute;
      display: block;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .lab-link:hover {
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      transform: scale(1.05);
    }

    /* Klickflächen */
    .link-sek1 { top: 35%; left: 24%; width: 15%; height: 35%; }
    .link-sek2 { top: 30%; left: 68%; width: 12%; height: 40%; }

    /* Impressums-Link */
    .impressum-link {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.8rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 5px 10px;
      border-radius: 4px;
    }
    .impressum-link:hover { color: white; background: rgba(0,0,0,0.4); }
  </style>
</head>
<body>

  <div class="table-container">
    <a href="./Sekundarstufe-I/index.html" class="lab-link link-sek1" title="Sekundarstufe I"></a>
    <a href="./Sekundarstufe-II/index.html" class="lab-link link-sek2" title="Sekundarstufe II"></a>
    
    <a href="./impressum.html" class="impressum-link">Impressum</a>
  </div>

</body>
</html>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }

    /* Hintergrundbild-Container */
    .table-container {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('lab-table.jpg') no-repeat center center;
      background-size: cover;
    }

    /* Die unsichtbaren "Schalter" über den Gläsern */

      position: absolute;
      display: block;
      border-radius: 50%; /* Rund, passt zum Gefäß */
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .lab-link:hover {
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      transform: scale(1.05);
    }

    /* Positionierung über den Objekten im Bild (muss evtl. leicht angepasst werden) */
    .link-sek1 {
      top: 35%; left: 24%;
      width: 15%; height: 35%;
    }

    .link-sek2 {
      top: 30%; left: 68%;
      width: 12%; height: 40%;
    }
  </style>
</head>
<body>

  <div class="table-container">
    <a href="./Sekundarstufe-I/index.html" class="lab-link link-sek1" title="Sekundarstufe I"></a>

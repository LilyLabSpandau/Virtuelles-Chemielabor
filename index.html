<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Virtuelles Chemielabor - Startseite</title>

  <style>
    :root {
      --primary-color: #0369a1;
      --sek1-color: #0f766e;
      --sek2-color: #b91c1c;
      --bg-color: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #475569;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--text-main);
    }

    header {
      background-color: var(--primary-color);
      color: white;
      padding: 60px 20px;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    a.card {
      display: block;
      padding: 40px;
      background: white;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-main);
      border: 2px solid #e2e8f0;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }

    a.card:hover {
      transform: translateY(-5px);
      border-color: var(--primary-color);
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .sek1-link { border-bottom: 4px solid var(--sek1-color); }
    .sek2-link { border-bottom: 4px solid var(--sek2-color); }

    footer {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header>
    <h1>Virtuelles Chemielabor</h1>
    <p>Bitte wählen Sie Ihre Stufe</p>
  </header>

  <main class="container">
    <a href="./Sekundarstufe-I/index.html" class="card sek1-link">
      <div class="card-title">Sekundarstufe I</div>
      <p>Klassen 7-10</p>
    </a>

    <a href="./Sekundarstufe-II/index.html" class="card sek2-link">
      <div class="card-title">Sekundarstufe II</div>
      <p>Qualifikationsphase (Q1-Q4)</p>
    </a>
  </main>

  <footer>
    <a href="./impressum.html">Impressum</a>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gleichgewichtssimulation: Eisen(III)-thiocyanat</title>
    <style>
        :root {
            --primary-bg: #f0f2f5;
            --panel-bg: #ffffff;
            --text-color: #2c3e50;
            --shift-color: #e74c3c;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .control-group { margin-bottom: 20px; }
        .control-group label { display: flex; justify-content: space-between; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }

        .viz-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            height: 100%;
        }

        .beaker-container {
            position: relative;
            width: 140px;
            height: 180px;
            border: 4px solid #aaa;
            border-top: none;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            background: rgb(245, 250, 255); 
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        }

        .liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80%;
            background-color: rgb(245, 250, 255); 
            transition: background-color 0.3s ease;
        }

        .equation-display {
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            width: 85%;
        }

        .arrow-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 150px;
        }

        .arrow-wrapper { width: 100%; display: flex; align-items: center; }
        .arrow-wrapper.top { justify-content: flex-start; }
        .arrow-wrapper.bottom { justify-content: flex-end; }

        .arrow {
            height: 4px;
            background: #333;
            position: relative;
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease;
        }

        .arrow.right::after {
            content: ''; position: absolute; right: -8px; top: calc(50% - 6px);
            border: 6px solid transparent; border-left-color: #333;
            transition: border-left-color 0.3s ease, top 0.3s ease;
        }

        .arrow.left::after {
            content: ''; position: absolute; left: -8px; top: calc(50% - 6px);
            border: 6px solid transparent; border-right-color: #333;
            transition: border-right-color 0.3s ease, top 0.3s ease;
        }

        .arrow.active { background: var(--shift-color); height: 8px; z-index: 10; }
        .arrow.active.right::after { border-left-color: var(--shift-color); top: -2px; }
        .arrow.active.left::after { border-right-color: var(--shift-color); top: -2px; }
        
        .arrow.inactive { background: #ccc; height: 2px; }
        .arrow.inactive.right::after { border-left-color: #ccc; top: -5px; }
        .arrow.inactive.left::after { border-right-color: #ccc; top: -5px; }

        .status-text {
            height: 20px;
            margin-top: 10px;
            font-weight: bold;
            color: var(--text-color);
            transition: color 0.3s;
        }

        .math-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .math-grid input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 85%; }

        button {
            padding: 10px 15px; border: none; border-radius: 5px;
            cursor: pointer; font-weight: bold; transition: opacity 0.3s;
        }

        .btn-check { background: #27ae60; color: white; }
        .btn-sol { background: #2980b9; color: white; }

        #feedback { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<h1>Simulation: Eisen(III)-thiocyanat-Gleichgewicht</h1>

<div class="container">
    <div class="panel">
        <h2>Parameter (Startwerte)</h2>
        <div class="control-group">
            <label>c<sub>0</sub>(Fe<sup>3+</sup>) <span id="lbl-fe">0.50</span> mol/l</label>
            <input type="range" id="range-fe" min="0" max="2" step="0.01" value="0.5">
        </div>
        <div class="control-group">
            <label>c<sub>0</sub>(SCN<sup>-</sup>) <span id="lbl-scn">0.50</span> mol/l</label>
            <input type="range" id="range-scn" min="0" max="2" step="0.01" value="0.5">
        </div>
        <div class="control-group">
            <label>c<sub>0</sub>([FeSCN]<sup>2+</sup>) <span id="lbl-fescn">0.00</span> mol/l</label>
            <input type="range" id="range-fescn" min="0" max="2" step="0.01" value="0">
        </div>
        <div class="control-group">
            <label>Temperatur <span id="lbl-temp">25</span> °C</label>
            <input type="range" id="range-temp" min="0" max="100" step="1" value="25">
        </div>
    </div>

    <div class="panel viz-box">
        <div class="beaker-container">
            <div id="liquid" class="liquid"></div>
        </div>

        <div class="equation-display">
            <span>Fe<sup>3+</sup> + SCN<sup>-</sup></span>
            <div class="arrow-container">
                <div class="arrow-wrapper top">
                    <div id="arrow-right" class="arrow right"></div>
                </div>
                <div class="arrow-wrapper bottom">
                    <div id="arrow-left" class="arrow left"></div>
                </div>
            </div>
            <span style="color: #8b0000"> [FeSCN]<sup>2+</sup></span>
        </div>
        
        <div class="status-text" id="status-text">Gleichgewicht eingestellt</div>

        <div style="width: 100%;">
            <h3>Aktueller K<sub>c</sub>: <span id="disp-kc">138.00</span> l/mol</h3>
            <div class="math-grid">
                <div>Fe<sup>3+</sup>: <input type="number" id="in-fe" step="0.001"></div>
                <div>SCN<sup>-</sup>: <input type="number" id="in-scn" step="0.001"></div>
                <div>[FeSCN]<sup>2+</sup>: <input type="number" id="in-fescn" step="0.001"></div>
            </div>
            <button class="btn-check" onclick="validate()">Prüfen</button>
            <button class="btn-sol" onclick="reveal()">Lösung</button>
            <div id="feedback"></div>
        </div>
    </div>
</div>

<script>
    const R = 8.314;
    const KC_25 = 138; 
    // Deutlich exotherm, damit Temperaturänderungen bei 0.5 mol/L auch mathematisch stark ins Gewicht fallen
    const DELTA_H = -40000; 

    const inputs = ['fe', 'scn', 'fescn', 'temp'].map(id => document.getElementById('range-' + id));
    const labels = ['fe', 'scn', 'fescn', 'temp'].map(id => document.getElementById('lbl-' + id));
    const liquid = document.getElementById('liquid');
    const arrowR = document.getElementById('arrow-right');
    const arrowL = document.getElementById('arrow-left');
    const dispKc = document.getElementById('disp-kc');
    const statusText = document.getElementById('status-text');

    let currentResults = { fe: 0, scn: 0, fescn: 0 };
    let currentReactX = 0; 
    let resetArrowTimer = null;

    function solveEquilibrium(A0, B0, C0, Kc) {
        const a = Kc;
        const b = -(Kc * (A0 + B0) + 1);
        const c = Kc * A0 * B0 - C0;
        const disc = Math.max(0, b * b - 4 * a * c);
        const x = (-b - Math.sqrt(disc)) / (2 * a);
        return { 
            fe: Math.max(0, A0 - x), 
            scn: Math.max(0, B0 - x), 
            fescn: Math.max(0, C0 + x),
            reactX: x 
        };
    }

    function calculateColor(fe, fescn) {
        const R_base = 245;
        const G_base = 250;
        const B_base = 255;

        // Fe3+ (Gelbliche Trübung)
        // linear gekappt bei 1.0 (erreicht Maximum bei 0.5 mol/L freiem Eisen)
        const iFe = Math.min(1, fe * 2); 
        const r_fe = R_base;
        const g_fe = G_base - (iFe * 30);
        const b_fe = B_base - (iFe * 200);

        // Komplex-Farbmischung (Sequenzielle Stufen für perfekten Farbverlauf)
        // 1. Blau verschwindet extrem schnell (bei 0.16 mol/L ist es weg -> kein Rosa/Mauve!)
        const dropBlue = Math.min(1, fescn * 6); 
        
        // 2. Grün verschwindet mittelschnell (bei 0.4 mol/L ist es weg -> Übergang Orange zu Rot)
        const dropGreen = Math.min(1, fescn * 2.5); 
        
        // 3. Rot dunkelt langsam ab (bei 0.66 mol/L erreicht es das tiefste Dunkelrot)
        const dropRed = Math.min(1, fescn * 1.5); 

        // Berechnung der finalen RGB-Werte
        let r = r_fe - (dropRed * 150);     // Sinkt bis auf ca. 95 (sehr dunkles Blutrot)
        let g = g_fe * (1 - dropGreen);     // Wird komplett genullt für reines Rot
        let b = b_fe * (1 - dropBlue);      // Wird als Erstes komplett genullt

        r = Math.max(0, Math.min(255, Math.round(r)));
        g = Math.max(0, Math.min(255, Math.round(g)));
        b = Math.max(0, Math.min(255, Math.round(b)));

        return `rgb(${r}, ${g}, ${b})`;
    }

    function handleInput() {
        const A0 = parseFloat(inputs[0].value);
        const B0 = parseFloat(inputs[1].value);
        const C0 = parseFloat(inputs[2].value);
        const tempC = parseFloat(inputs[3].value);
        const tempK = tempC + 273.15;

        inputs.forEach((input, i) => labels[i].innerText = parseFloat(input.value).toFixed(2));
        labels[3].innerText = tempC;

        const newKc = KC_25 * Math.exp((-DELTA_H / R) * (1 / tempK - 1 / 298.15));
        dispKc.innerText = newKc.toFixed(2);

        const eq = solveEquilibrium(A0, B0, C0, newKc);

        const deltaX = eq.reactX - currentReactX;
        visualizeShift(deltaX);

        liquid.style.backgroundColor = calculateColor(eq.fe, eq.fescn);

        currentResults = { fe: eq.fe, scn: eq.scn, fescn: eq.fescn };
        currentReactX = eq.reactX;

        clearTimeout(resetArrowTimer);
        resetArrowTimer = setTimeout(() => {
            resetArrows(newKc);
        }, 800);

        document.getElementById('feedback').style.display = 'none';
    }

    function visualizeShift(delta) {
        const threshold = 0.0005; 
        
        arrowR.classList.remove('active', 'inactive');
        arrowL.classList.remove('active', 'inactive');

        if (delta > threshold) {
            arrowR.style.width = '100%';
            arrowR.classList.add('active');
            arrowL.style.width = '10%';
            arrowL.classList.add('inactive');
            statusText.innerText = "\u2192 Ausweichreaktion: Bildung von Produkt";
            statusText.style.color = "var(--shift-color)";
        } else if (delta < -threshold) {
            arrowL.style.width = '100%';
            arrowL.classList.add('active');
            arrowR.style.width = '10%';
            arrowR.classList.add('inactive');
            statusText.innerText = "\u2190 Ausweichreaktion: Zerfall zu Edukten";
            statusText.style.color = "var(--shift-color)";
        }
    }

    function resetArrows(kc) {
        arrowR.classList.remove('active', 'inactive');
        arrowL.classList.remove('active', 'inactive');
        
        const logKc = Math.log10(kc);
        const baseWidth = 50;
        const scaleFactor = 15;
        
        arrowR.style.width = Math.min(Math.max(baseWidth + logKc * scaleFactor, 10), 100) + '%';
        arrowL.style.width = Math.min(Math.max(baseWidth - logKc * scaleFactor, 10), 100) + '%';
        
        statusText.innerText = "Gleichgewicht eingestellt";
        statusText.style.color = "#27ae60";
    }

    function validate() {
        const uFe = parseFloat(document.getElementById('in-fe').value);
        const uScn = parseFloat(document.getElementById('in-scn').value);
        const uComp = parseFloat(document.getElementById('in-fescn').value);
        const fb = document.getElementById('feedback');
        const tol = 0.02;
        const isCorrect = Math.abs(uFe - currentResults.fe) < tol && 
                          Math.abs(uScn - currentResults.scn) < tol && 
                          Math.abs(uComp - currentResults.fescn) < tol;
        
        fb.style.display = 'block';
        fb.innerText = isCorrect ? "Korrekt berechnet!" : "Nicht korrekt. Prüfen Sie das Massenwirkungsgesetz.";
        fb.style.background = isCorrect ? "#d4edda" : "#f8d7da";
        fb.style.color = isCorrect ? "#155724" : "#721c24";
    }

    function reveal() {
        document.getElementById('in-fe').value = currentResults.fe.toFixed(3);
        document.getElementById('in-scn').value = currentResults.scn.toFixed(3);
        document.getElementById('in-fescn').value = currentResults.fescn.toFixed(3);
    }

    const initA0 = parseFloat(inputs[0].value);
    const initB0 = parseFloat(inputs[1].value);
    const initC0 = parseFloat(inputs[2].value);
    const initTempK = parseFloat(inputs[3].value) + 273.15;
    const initKc = KC_25 * Math.exp((-DELTA_H / R) * (1 / initTempK - 1 / 298.15));
    
    const initEq = solveEquilibrium(initA0, initB0, initC0, initKc);
    currentResults = { fe: initEq.fe, scn: initEq.scn, fescn: initEq.fescn };
    currentReactX = initEq.reactX;
    
    liquid.style.backgroundColor = calculateColor(initEq.fe, initEq.fescn);
    
    inputs.forEach(i => i.addEventListener('input', handleInput));
</script>
</body>
</html>
